services:
  # ── PHP Application ──────────────────────────────────────
  app:
    build:
      context: .
      target: production
    container_name: pilates_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/vendor          # exclude vendor dari mount
      - /var/www/node_modules    # exclude node_modules dari mount
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=pilates
      - DB_USERNAME=pilates
      - DB_PASSWORD=secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pilates_network

  # ── Nginx Web Server ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pilates_nginx
    restart: unless-stopped
    ports:
      - "8000:80"   # 8080 dipakai Jenkins, jadi app pakai 8000
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pilates_network

  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pilates_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pilates
      POSTGRES_USER: pilates
      POSTGRES_PASSWORD: secret
    volumes:
      - pilates_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # port 5433 di host (agar tidak bentrok dengan Postgres lokal di 5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilates"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pilates_network

  # ── Queue Worker ──────────────────────────────────────────
  queue:
    build:
      context: .
      target: production
    container_name: pilates_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_DATABASE=pilates
      - DB_USERNAME=pilates
      - DB_PASSWORD=secret
    depends_on:
      - app
      - db
    networks:
      - pilates_network

networks:
  pilates_network:
    driver: bridge

volumes:
  pilates_db_data:
    driver: local
