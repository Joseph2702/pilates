name: CI Pipeline

# ─── Kapan pipeline ini berjalan ──────────────────────────────────────────────
on:
  push:
    branches: [main, develop]       # Setiap push ke main/develop
  pull_request:
    branches: [main]                 # Setiap PR yang ingin merge ke main

# ─── Environment variables global ─────────────────────────────────────────────
env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"

# ==============================================================================
# JOB 1: Automated Tests
# Ini yang paling penting — semua code yang masuk HARUS lulus test dulu
# ==============================================================================
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest          # GitHub menyediakan VM Ubuntu gratis

    steps:
      # ── 1. Download source code dari GitHub ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup PHP dengan versi yang kita tentukan ──
      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_sqlite, pdo_pgsql, zip, gd, bcmath
          coverage: none            # disable Xdebug untuk speed

      # ── 3. Cache composer dependencies (agar tidak download ulang setiap run) ──
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # ── 4. Install PHP dependencies ──
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ── 5. Buat .env untuk testing ──
      - name: Create .env.testing
        run: |
          cp .env.example .env
          php artisan key:generate

      # ── 6. Jalankan migrations di SQLite in-memory ──
      # (phpunit.xml sudah set DB_CONNECTION=sqlite DB_DATABASE=:memory:)
      - name: Run database migrations
        run: php artisan migrate --force

      # ── 7. JALANKAN TESTS! ──
      - name: Run PHPUnit tests
        run: php artisan test --parallel

      # ── 8. Upload test results jika gagal (untuk debugging) ──
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: storage/logs/

  # ============================================================================
  # JOB 2: Code Style Check
  # Pastikan semua code mengikuti Laravel Pint standards
  # ============================================================================
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    needs: test                      # Hanya jalan jika test LULUS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: ./vendor/bin/pint --test   # --test = cek saja, jangan auto-fix

  # ============================================================================
  # JOB 3: Build Docker Image
  # Validasi bahwa Docker image bisa dibangun dengan sukses
  # Hanya berjalan di branch main (bukan di setiap PR)
  # ============================================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]              # Hanya jalan jika test DAN lint lulus
    if: github.ref == 'refs/heads/main'   # Hanya di branch main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Setup Docker Buildx (untuk multi-platform builds) ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build image tapi tidak push (validasi saja) ──
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false               # false = build saja, tidak push ke registry
          tags: pilates-app:${{ github.sha }}
          cache-from: type=gha      # gunakan GitHub Actions cache
          cache-to: type=gha,mode=max

  # ============================================================================
  # JOB 4: Deploy ke Railway (Continuous Deployment)
  # Otomatis deploy ke production setelah semua check lulus
  #
  # CARA SETUP:
  # 1. Buat akun di railway.app
  # 2. New Project → Deploy from GitHub Repo → pilih repo ini
  # 3. Tambahkan PostgreSQL service di Railway
  # 4. Di Railway: Settings → Generate Deploy Token
  # 5. Di GitHub repo: Settings → Secrets → New secret
  #    Nama: RAILWAY_TOKEN, Value: token dari Railway
  # ============================================================================
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service pilates-app
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
